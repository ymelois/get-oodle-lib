name: Ruff

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/ruff-action@v4.1.0
        with:
          args: check
      - uses: astral-sh/ruff-action@v4.1.0
        with:
          args: format --check --diff
